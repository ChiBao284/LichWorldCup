document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,a:{f:'🇵🇱',c:'POL'},sh:2,sa:0,day:'11 JUN'},\n      {g:'B',h:{f:'🇦🇷',c:'ARG'},a:{f:'🇲🇦',c:'MAR'},sh:3,sa:1,day:'11 JUN'},\n      {g:'C',h:{f:'🇫🇷',c:'FRA'},a:{f:'🇯🇵',c:'JPN'},sh:1,sa:1,day:'12 JUN'},\n      {g:'D',h:{f:'🇧🇷',c:'BRA'},a:{f:'🇪🇸',c:'ESP'},sh:0,sa:2,day:'12 JUN'},\n      {g:'A',h:{f:'🇨🇦',c:'CAN'},a:{f:'🇩🇪',c:'GER'},sh:1,sa:2,day:'12 JUN'}\n    ];\n    this.board=[\n      {n:'Trang Nguyễn',ai:1,acc:92,w:11},\n      {n:'Quân Lê',ai:6,acc:88,w:10},\n      {n:'Linh Phạm',ai:8,acc:84,w:9},\n      {n:'Bảo Trần',ai:3,acc:81,w:9},\n      {n:'Hà Vũ',ai:10,acc:77,w:8}\n    ];\n    this.ni=0; this.uid=0;\n    const rnd=(a)=>a[Math.floor(Math.random()*a.length)];\n    const mk=()=>({id:'b'+(this.uid++),name:this.names[(this.ni++)%this.names.length],av:rnd(this.avatars)});\n    const seed=(n)=>Array.from({length:n},mk);\n    this.state={\n      user:null, showLogin:false, draftName:'', draftAv:null, googleDone:false,\n      revealed:new Set(['hero','marquee']),\n      minute:71, scoreH:1, scoreA:1, status:'LIVE',\n      homePicks:seed(7), awayPicks:seed(4)\n    };\n  }\n  componentDidMount(){\n    this.checkReveal=()=>{\n      const add=[];\n      document.querySelectorAll('[data-reveal]').forEach(el=>{\n        const id=el.getAttribute('data-reveal');\n        if(!id||this.state.revealed.has(id)) return;\n        const r=el.getBoundingClientRect();\n        if(r.top < window.innerHeight*0.86 && r.bottom > 0) add.push(id);\n      });\n      if(add.length) this.setState(s=>({revealed:new Set([...s.revealed,...add])}));\n    };\n    this.onScroll=()=>{ this.checkReveal(); };\n    this.revealPoll=setInterval(this.checkReveal, 400);\n    window.addEventListener('scroll', this.onScroll, {passive:true});\n    window.addEventListener('resize', this.onScroll, {passive:true});\n    setTimeout(this.checkReveal, 120);\n\n    this.clock=setInterval(()=>{\n      this.setState(s=>{\n        if(s.status!=='LIVE') return {};\n        let m=s.minute+1, sh=s.scoreH, sa=s.scoreA, st='LIVE';\n        if(Math.random()<0.07){ if(Math.random()<0.5) sh++; else sa++; }\n        if(m>=90){ m=90; st='FT'; }\n        return {minute:m,scoreH:sh,scoreA:sa,status:st};\n      });\n    },1700);\n\n    this.bots=setInterval(()=>{\n      this.setState(s=>{\n        const total=s.homePicks.length+s.awayPicks.length;\n        if(total>=46) return {};\n        const rnd=(a)=>a[Math.floor(Math.random()*a.length)];\n        const u={id:'b'+(this.uid++),name:this.names[(this.ni++)%this.names.length],av:rnd(this.avatars)};\n        if(Math.random()<0.56) return {homePicks:[...s.homePicks,u]};\n        return {awayPicks:[...s.awayPicks,u]};\n      });\n    },2400);\n  }\n  componentWillUnmount(){ clearInterval(this.clock); clearInterval(this.bots); clearInterval(this.revealPoll); window.removeEventListener('scroll', this.onScroll); window.removeEventListener('resize', this.onScroll); }\n\n  openLogin(){ this.setState({showLogin:true, googleDone:false, draftName:'', draftAv:null}); }\n  closeLogin(){ this.setState({showLogin:false}); }\n  googleAuth(){ const n=this.names[Math.floor(Math.random()*this.names.length)]; this.setState({googleDone:true, draftName:n+' '+['Nguyễn','Trần','Lê','Phạm'][Math.floor(Math.random()*4)]}); }\n  finishLogin(){\n    const name=(this.state.draftName||'').trim()||'Khách';\n    const av=this.state.draftAv||this.anon;\n    this.setState({user:{id:'me',name,av,you:true},showLogin:false});\n  }\n  pick(side){\n    if(!this.state.user){ this.openLogin(); return; }\n    this.setState(s=>{\n      const me={...s.user,you:true};\n      const h=s.homePicks.filter(u=>u.id!=='me');\n      const a=s.awayPicks.filter(u=>u.id!=='me');\n      if(side==='home') return {homePicks:[me,...h], awayPicks:a};\n      return {homePicks:h, awayPicks:[me,...a]};\n    });\n  }\n\n  renderVals(){\n    const s=this.state;\n    const React=this.constructor.React||window.React;\n    const avEl=(av,size,o)=>{ o=o||{}; return React.createElement('div',{key:o.key,style:{width:size,height:size,minWidth:size,borderRadius:'50%',background:av.b,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.round(size*0.46),fontWeight:700,fontFamily:\"'Archivo',sans-serif\",boxShadow:o.ring?('0 0 0 3px #fff'):'none',marginLeft:o.overlap?Math.round(-size*0.3):0,position:'relative',zIndex:o.z||1,outline:o.you?'2px solid #E8351F':'none',outlineOffset:'1px',animation:o.pop?'wc-pop .4s cubic-bezier(.2,1.4,.4,1)':'none'}},av.e); };\n    const stack=(arr)=>{\n      const out=[]; const shown=arr.slice(0,10);\n      shown.forEach((u,i)=>out.push(avEl(u.av,42,{key:u.id,overlap:i>0,ring:true,z:30-i,you:u.you})));\n      const extra=arr.length-shown.length;\n      if(extra>0) out.push(React.createElement('div',{key:'more',style:{width:42,height:42,minWidth:42,borderRadius:'50%',background:'#16140F',color:'#FBFAF7',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:\"'Space Mono',monospace\",fontSize:12,fontWeight:700,boxShadow:'0 0 0 3px #fff',marginLeft:-13,position:'relative',zIndex:1}},'+'+extra));\n      return out;\n    };\n    const hc=s.homePicks.length, ac=s.awayPicks.length, tot=Math.max(hc+ac,1);\n    const ph=Math.round(hc/tot*100), pa=100-ph;\n    const seen=s.revealed;\n    const rev=(id,d)=>seen.has(id)?{opacity:1,transform:'translateY(0)',transition:'opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)'}:{opacity:0,transform:'translateY('+(d||44)+'px)',transition:'opacity .8s,transform .8s'};\n    const pickBarEl=React.createElement('div',{style:{display:'flex',width:'100%'}},[\n      React.createElement('div',{key:'h',style:{width:ph+'%',background:'#0B6E4F',transition:'width .8s ease'}}),\n      React.createElement('div',{key:'a',style:{width:pa+'%',background:'#1F4FE8',transition:'width .8s ease'}})\n    ]);\n    return {\n      setRoot:(el)=>{this.root=el;},\n      isLoggedIn:!!s.user, notLoggedIn:!s.user,\n      userName:s.user?s.user.name:'', userAvatar:s.user?avEl(s.user.av,30,{}):null,\n      openLogin:()=>this.openLogin(), closeLogin:()=>this.closeLogin(),\n      googleAuth:()=>this.googleAuth(), googleDone:s.googleDone, notGoogleDone:!s.googleDone, showLogin:s.showLogin,\n      stopProp:(e)=>e.stopPropagation(),\n      draftName:s.draftName, setDraftName:(e)=>this.setState({draftName:e.target.value}),\n      avatarGridEls: this.avatars.map((av,i)=>React.createElement('div',{key:i,onClick:()=>this.setState({draftAv:av}),style:{width:54,height:54,borderRadius:'50%',background:av.b,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,cursor:'pointer',outline:(s.draftAv&&s.draftAv.e===av.e&&!s.draftAv.anon)?'3px solid #16140F':'3px solid transparent',outlineOffset:'2px',transition:'outline-color .15s'}},av.e)),\n      anonEl: React.createElement('div',{onClick:()=>this.setState({draftAv:this.anon}),style:{width:54,height:54,borderRadius:'50%',background:'#9AA0A6',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,cursor:'pointer',border:'2px dashed #fff',outline:(s.draftAv&&s.draftAv.anon)?'3px solid #16140F':'3px solid transparent',outlineOffset:'2px'}},'?'),\n      finishLogin:()=>this.finishLogin(),\n      minuteLabel:s.status==='FT'?'FULL TIME':(s.minute+\"'\"),\n      scoreLabel:s.scoreH+' – '+s.scoreA,\n      homeCount:hc, awayCount:ac, pctHome:ph, pctAway:pa,\n      homeAvatarEls:stack(s.homePicks), awayAvatarEls:stack(s.awayPicks),\n      pickBarEl, pickHome:()=>this.pick('home'), pickAway:()=>this.pick('away'),\n      recent:this.recent.map((m,i)=>({...m,key:i,scoreStr:m.sh+' – '+m.sa,homeWin:m.sh>m.sa,awayWin:m.sa>m.sh})),\n      board:this.board.map((r,i)=>({key:i,rank:String(i+1).padStart(2,'0'),name:r.n,acc:r.acc+'%',wins:r.w+' đúng',avatarEl:avEl(this.avatars[r.ai],38,{}),top:i===0})),\n      rv:{hero:rev('hero',24),marquee:rev('marquee',24),live:rev('live'),pick:rev('pick'),recent:rev('recent'),board:rev('board'),foot:rev('foot')}\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
